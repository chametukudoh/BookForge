        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/line-art/bulk-upload:
    post:
      summary: Bulk upload line-art assets
      operationId: postProjectsByProjectIdLineArtBulkUpload
      tags: [LineArt]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkLineArtUploadRequest'
      responses:
        '202':
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineArtBulkUploadResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/line-art:
    get:
      summary: List line-art assets
      operationId: getProjectsByProjectIdLineArt
      tags: [LineArt]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LineArtAssetStatus'
        - name: collection_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated line-art list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineArtAssetListResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/line-art/{assetId}/reprocess:
    post:
      summary: Reprocess line-art asset
      operationId: postProjectsByProjectIdLineArtByAssetIdReprocess
      tags: [LineArt]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineArtReprocessRequest'
      responses:
