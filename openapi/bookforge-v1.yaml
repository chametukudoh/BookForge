    CreateProjectRequest:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        template_id: { type: string, format: uuid }
        settings: { type: object, additionalProperties: true }
        style_profile_id: { type: string, format: uuid }
        style_mode: { type: string, enum: [GLOBAL, PER_PAGE] }
      required: [title]
    UpdateProjectRequest:
      type: object
      properties:
        title: { type: string }
        settings: { type: object, additionalProperties: true }
        style_profile_id: { type: string, format: uuid }
        style_mode: { type: string, enum: [GLOBAL, PER_PAGE] }
    CloneProjectRequest:
