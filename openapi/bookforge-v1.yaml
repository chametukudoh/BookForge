        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MazePatchWallsRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MazeState'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/maze/terminals:
    patch:
      summary: Update maze entrance/exit
      operationId: patchProjectsByProjectIdPagesByPageIdMazeTerminals
      tags: [Maze]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MazePatchTerminalsRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MazeState'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/maze/solve:
    post:
      summary: Solve maze
      operationId: postProjectsByProjectIdPagesByPageIdMazeSolve
      tags: [Maze]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
      responses:
        '200':
          description: Solved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MazeSolveResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/maze/validate:
    post:
      summary: Validate maze
      operationId: postProjectsByProjectIdPagesByPageIdMazeValidate
