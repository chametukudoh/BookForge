        op: { type: string, enum: [add, remove] }
      required: [from, to, op]
    MazeState:
      type: object
      properties:
        page_id: { type: string, format: uuid }
        revision: { type: integer, minimum: 1 }
        rows: { type: integer, minimum: 8, maximum: 80 }
        cols: { type: integer, minimum: 8, maximum: 80 }
        graph: { type: object, additionalProperties: true }
        entrance: { $ref: '#/components/schemas/Coordinate' }
        exit: { $ref: '#/components/schemas/Coordinate' }
        solution_path:
          type: array
          items: { $ref: '#/components/schemas/Coordinate' }
      required: [page_id, revision, rows, cols, graph, entrance, exit]
    MazeSolveResponse:
      type: object
      properties:
        page_id: { type: string, format: uuid }
        revision: { type: integer, minimum: 1 }
