    WordSearchAddWordRequest:
      type: object
      properties:
        revision: { type: integer, minimum: 1 }
        text: { type: string, minLength: 2 }
        start: { $ref: '#/components/schemas/Coordinate' }
        direction: { type: string, enum: [N, S, E, W, NE, NW, SE, SW] }
        locked: { type: boolean }
        hidden: { type: boolean }
      required: [revision, text, start, direction]
    WordSearchUpdateWordRequest:
      type: object
      properties:
        revision: { type: integer, minimum: 1 }
        start: { $ref: '#/components/schemas/Coordinate' }
