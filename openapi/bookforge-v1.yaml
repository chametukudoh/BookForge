            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/attach-asset:
    post:
      summary: Attach asset to page
      operationId: postProjectsByProjectIdPagesByPageIdAttachAsset
      tags: [Assets]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachAssetRequest'
      responses:
        '200':
          description: Attached
          content:
            application/json:
              schema:
