openapi: 3.1.0
info:
  title: BookForge Studio API
  version: 1.0.0
  description: API contract from BookForge PRD v1.3
  license:
    name: Proprietary
    url: https://bookforge.local/license
servers:
  - url: https://api.bookforge.local/api/v1
security:
  - bearerAuth: []
paths:
  /projects:
    post:
      summary: Create project
      operationId: postProjects
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}:
    get:
      summary: Get project
      operationId: getProjectsByProjectId
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetailResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update project
      operationId: patchProjectsByProjectId
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/clone:
    post:
      summary: Clone project
      operationId: postProjectsByProjectIdClone
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneProjectRequest'
      responses:
        '201':
          description: Cloned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/archive:
    post:
      summary: Archive project
      operationId: postProjectsByProjectIdArchive
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '202':
          description: Archive accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/plan:
    post:
      summary: Build page plan and queue generation
      operationId: postProjectsByProjectIdPagesPlan
      tags: [Pages]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PagePlanRequest'
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}:
    patch:
      summary: Patch page metadata
      operationId: patchProjectsByProjectIdPagesByPageId
      tags: [Pages]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchPageRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/regenerate:
    post:
      summary: Regenerate page
      operationId: postProjectsByProjectIdPagesByPageIdRegenerate
      tags: [Pages]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegeneratePageRequest'
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/word-search/generate:
    post:
      summary: Generate Word Search
      operationId: postProjectsByProjectIdPagesByPageIdWordSearchGenerate
      tags: [WordSearch]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WordSearchGenerateRequest'
      responses:
        '200':
          description: Generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordSearchState'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/word-search/cells:
    patch:
      summary: Patch Word Search cells
      operationId: patchProjectsByProjectIdPagesByPageIdWordSearchCells
      tags: [WordSearch]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WordSearchPatchCellsRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordSearchState'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/word-search/words:
    post:
      summary: Add Word Search word
      operationId: postProjectsByProjectIdPagesByPageIdWordSearchWords
      tags: [WordSearch]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WordSearchAddWordRequest'
      responses:
        '201':
          description: Added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordPlacement'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/word-search/words/{wordId}:
    patch:
      summary: Update Word Search word
      operationId: patchProjectsByProjectIdPagesByPageIdWordSearchWordsByWordId
      tags: [WordSearch]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
        - $ref: '#/components/parameters/WordId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WordSearchUpdateWordRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordPlacement'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete Word Search word
      operationId: deleteProjectsByProjectIdPagesByPageIdWordSearchWordsByWordId
      tags: [WordSearch]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
        - $ref: '#/components/parameters/WordId'
      responses:
        '204':
          description: Deleted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/word-search/validate:
    post:
      summary: Validate Word Search state
      operationId: postProjectsByProjectIdPagesByPageIdWordSearchValidate
      tags: [WordSearch]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
      responses:
        '200':
          description: QC results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QcResultList'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/maze/generate:
    post:
      summary: Generate maze
      operationId: postProjectsByProjectIdPagesByPageIdMazeGenerate
      tags: [Maze]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MazeGenerateRequest'
      responses:
        '200':
          description: Generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MazeState'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/pages/{pageId}/maze/walls:
    patch:
      summary: Edit maze walls
      operationId: patchProjectsByProjectIdPagesByPageIdMazeWalls
