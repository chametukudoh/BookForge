        filename: { type: string }
        mime_type: { type: string }
        size_bytes: { type: integer, minimum: 1 }
        collection_id: { type: string, format: uuid }
        tags:
          type: array
          items: { type: string }
      required: [filename, mime_type, size_bytes]
