              schema:
                $ref: '#/components/schemas/QcResultList'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /style-profiles:
    get:
      summary: List style profiles
      operationId: getStyleProfiles
      tags: [StyleProfiles]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StyleProfile'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create style profile
      operationId: postStyleProfiles
      tags: [StyleProfiles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStyleProfileRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StyleProfile'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /style-profiles/{styleProfileId}:
    patch:
      summary: Update style profile
      operationId: patchStyleProfilesByStyleProfileId
      tags: [StyleProfiles]
      parameters:
        - $ref: '#/components/parameters/StyleProfileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStyleProfileRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StyleProfile'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/style/apply:
    post:
      summary: Apply style profile
      operationId: postProjectsByProjectIdStyleApply
      tags: [StyleProfiles]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyStyleRequest'
      responses:
        '200':
          description: Applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/prompts/build:
    post:
      summary: Build prompts
      operationId: postProjectsByProjectIdPromptsBuild
      tags: [PromptStudio]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Prompt set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptBuildResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/prompts/export:
    get:
      summary: Export prompts
      operationId: getProjectsByProjectIdPromptsExport
      tags: [PromptStudio]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [txt, md, csv]
      responses:
        '200':
          description: Export resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Export'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/assets/presign:
    post:
      summary: Presign asset upload
      operationId: postProjectsByProjectIdAssetsPresign
      tags: [Assets]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignAssetRequest'
      responses:
        '200':
          description: Presigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignAssetResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/assets/{assetId}/commit:
    post:
      summary: Commit uploaded asset
      operationId: postProjectsByProjectIdAssetsByAssetIdCommit
      tags: [Assets]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitAssetRequest'
      responses:
        '200':
          description: Committed
