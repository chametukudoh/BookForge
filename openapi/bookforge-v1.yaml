        pinned_assets:
          type: array
          items: { $ref: '#/components/schemas/DotToDotPinnedAsset' }
      required: [source_mode, page_count, difficulty, trim_id]
    DotToDotLibraryAssignment:
      type: object
      properties:
        page_id: { type: string, format: uuid }
        page_number: { type: integer, minimum: 1 }
        source_asset_id: { type: string, format: uuid }
      required: [source_asset_id]
    DotToDotLibraryAssignRequest:
      type: object
      properties:
        strict: { type: boolean, default: false }
        assignments:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/DotToDotLibraryAssignment' }
      required: [assignments]

    CreateExportRequest:
      type: object
      properties:
        variant:
          type: string
          enum: [INTERIOR, SOLUTIONS, COMBINED, PROMPT_PACK]
