    get:
      summary: Get job
      operationId: getProjectsByProjectIdJobsByJobId
      tags: [Jobs]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects/{projectId}/jobs/{jobId}/cancel:
    post:
      summary: Cancel job
      operationId: postProjectsByProjectIdJobsByJobIdCancel
      tags: [Jobs]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/JobId'
      responses:
        '202':
          description: Cancellation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      in: path
      name: projectId
      required: true
      schema: { type: string, format: uuid }
    PageId:
      in: path
      name: pageId
      required: true
      schema: { type: string, format: uuid }
    WordId:
      in: path
      name: wordId
      required: true
      schema: { type: string }
    StyleProfileId:
      in: path
      name: styleProfileId
      required: true
      schema: { type: string, format: uuid }
    AssetId:
      in: path
      name: assetId
      required: true
      schema: { type: string, format: uuid }
    ExportId:
      in: path
      name: exportId
      required: true
      schema: { type: string, format: uuid }
    JobId:
      in: path
      name: jobId
      required: true
      schema: { type: string, format: uuid }
  schemas:
    MessageResponse:
      type: object
      properties:
        message: { type: string }
      required: [message]
    ErrorResponse:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true
      required: [code, message]
    Coordinate:
      type: object
      properties:
        row: { type: integer, minimum: 0 }
        col: { type: integer, minimum: 0 }
      required: [row, col]
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        owner_id: { type: string, format: uuid }
        title: { type: string }
        template_id:
          oneOf:
            - { type: string, format: uuid }
            - { type: 'null' }
        status: { type: string, enum: [draft, ready, exporting, archived] }
        style_profile_id:
          oneOf:
            - { type: string, format: uuid }
            - { type: 'null' }
        style_mode: { type: string, enum: [GLOBAL, PER_PAGE] }
        settings_json: { type: object, additionalProperties: true }
      required: [id, owner_id, title, status, style_mode, settings_json]
    ProjectDetailResponse:
      type: object
      properties:
        project: { $ref: '#/components/schemas/Project' }
        page_summary: { type: object, additionalProperties: true }
        latest_qc: { type: object, additionalProperties: true }
      required: [project]
    Page:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        page_number: { type: integer, minimum: 1 }
        type: { type: string }
        config_json: { type: object, additionalProperties: true }
        source_mode:
          oneOf:
            - $ref: '#/components/schemas/LineArtSourceMode'
            - { type: 'null' }
        source_asset_id:
          oneOf:
            - { type: string, format: uuid }
            - { type: 'null' }
        recipe_json: { type: object, additionalProperties: true }
        qc_state: { type: string, enum: [pending, passed, warning, error] }
      required: [id, project_id, page_number, type, config_json, qc_state]
    StyleProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        category: { type: string }
        audience_tags:
          type: array
          items: { type: string }
        rules_json: { type: object, additionalProperties: true }
        prompt_blocks: { type: object, additionalProperties: true }
        version: { type: integer, minimum: 1 }
        is_public: { type: boolean }
      required: [id, name, category, rules_json, prompt_blocks, version, is_public]
    Asset:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        storage_key: { type: string }
        mime_type: { type: string }
        width:
          oneOf:
            - { type: integer }
            - { type: 'null' }
        height:
          oneOf:
            - { type: integer }
            - { type: 'null' }
      required: [id, project_id, storage_key, mime_type]
    LineArtSourceMode:
      type: string
      enum: [theme_ai, single_trace, bulk_library]
    LineArtAssetStatus:
      type: string
      enum: [uploaded, processing, ready, failed, archived]
    LineArtAsset:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        collection_id:
          oneOf:
            - { type: string, format: uuid }
            - { type: 'null' }
        base_asset_id:
          oneOf:
            - { type: string, format: uuid }
            - { type: 'null' }
        source_filename: { type: string }
        mime_type: { type: string }
        width:
          oneOf:
            - { type: integer }
            - { type: 'null' }
        height:
          oneOf:
            - { type: integer }
            - { type: 'null' }
        sha256:
          oneOf:
            - { type: string }
            - { type: 'null' }
        tags:
          type: array
          items: { type: string }
        status: { $ref: '#/components/schemas/LineArtAssetStatus' }
        trace_json:
          oneOf:
            - { type: object, additionalProperties: true }
            - { type: 'null' }
        diagnostics_json: { type: object, additionalProperties: true }
        metadata_json: { type: object, additionalProperties: true }
      required:
        [
          id,
          project_id,
          source_filename,
          mime_type,
          tags,
          status,
          diagnostics_json,
          metadata_json
        ]
    LineArtAssetListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/LineArtAsset' }
        next_cursor:
          oneOf:
            - { type: string }
            - { type: 'null' }
      required: [items]
    Job:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        type: { type: string, enum: [generate, qc, render, export] }
        status: { type: string, enum: [queued, running, succeeded, failed, cancelled] }
        payload_json: { type: object, additionalProperties: true }
        result_json:
          oneOf:
            - { type: object, additionalProperties: true }
            - { type: 'null' }
        error_json:
          oneOf:
            - { type: object, additionalProperties: true }
            - { type: 'null' }
      required: [id, project_id, type, status, payload_json]
    Export:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        variant: { type: string, enum: [INTERIOR, SOLUTIONS, COMBINED, PROMPT_PACK] }
        status: { type: string, enum: [queued, building, ready, failed] }
        file_asset_id:
          oneOf:
            - { type: string, format: uuid }
            - { type: 'null' }
      required: [id, project_id, variant, status]
    QcResult:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        page_id:
          oneOf:
            - { type: string, format: uuid }
            - { type: 'null' }
        rule_id: { type: string }
        severity: { type: string, enum: [info, warning, error] }
        message: { type: string }
        details_json: { type: object, additionalProperties: true }
      required: [id, project_id, rule_id, severity, message, details_json]
    QcResultList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/QcResult' }
      required: [items]
    WordPlacement:
      type: object
      properties:
        id: { type: string }
        text: { type: string }
        start: { $ref: '#/components/schemas/Coordinate' }
        direction: { type: string, enum: [N, S, E, W, NE, NW, SE, SW] }
        locked: { type: boolean }
        hidden: { type: boolean }
      required: [id, text, start, direction]
    WordSearchState:
      type: object
      properties:
        page_id: { type: string, format: uuid }
        revision: { type: integer, minimum: 1 }
        grid_size: { type: integer, minimum: 10, maximum: 24 }
        locale: { type: string }
        grid:
          type: array
          items:
            type: array
            items: { type: string, minLength: 1, maxLength: 1 }
        words:
          type: array
          items: { $ref: '#/components/schemas/WordPlacement' }
      required: [page_id, revision, grid_size, locale, grid, words]
    MazeEdgeMutation:
      type: object
      properties:
        from: { $ref: '#/components/schemas/Coordinate' }
